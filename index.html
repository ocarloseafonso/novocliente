<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agente GMN – Cadastro de Empresa</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c27;
    --border: #2a2a3a;
    --accent: #4f8eff;
    --accent2: #a78bfa;
    --green: #34d399;
    --red: #f87171;
    --text: #e8e8f0;
    --muted: #7070a0;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0;
  }

  /* ── Header ── */
  header {
    width: 100%;
    max-width: 760px;
    padding: 28px 24px 0;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.5px;
    color: #fff;
  }
  .logo span { color: var(--accent); }

  .badge {
    font-size: 11px;
    font-weight: 500;
    background: rgba(79,142,255,.15);
    color: var(--accent);
    border: 1px solid rgba(79,142,255,.3);
    padding: 3px 10px;
    border-radius: 20px;
    margin-left: auto;
  }

  /* ── Progress ── */
  .progress-wrap {
    width: 100%;
    max-width: 760px;
    padding: 20px 24px 0;
  }
  .progress-label {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
  }
  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 4px;
    transition: width .6s cubic-bezier(.4,0,.2,1);
    width: 0%;
  }

  /* ── Chat container ── */
  .chat-wrap {
    width: 100%;
    max-width: 760px;
    padding: 20px 24px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  #chatBox {
    display: flex;
    flex-direction: column;
    gap: 16px;
    min-height: 300px;
  }

  /* ── Messages ── */
  .msg {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    animation: fadeUp .35s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; }

  .avatar {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  .avatar.bot {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
  }

  .avatar.user {
    background: var(--surface2);
    border: 1px solid var(--border);
    font-size: 13px;
    color: var(--muted);
  }

  .bubble {
    max-width: 78%;
    padding: 14px 18px;
    border-radius: var(--radius);
    line-height: 1.6;
    font-size: 15px;
  }

  .bubble.bot {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
  }

  .bubble.user {
    background: var(--accent);
    color: #fff;
    border-top-right-radius: 4px;
  }

  /* tip inside bot bubble */
  .tip {
    margin-top: 10px;
    padding: 10px 12px;
    background: rgba(167,139,250,.1);
    border-left: 3px solid var(--accent2);
    border-radius: 8px;
    font-size: 13px;
    color: var(--accent2);
    line-height: 1.5;
  }

  /* options chips */
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 12px;
  }

  .chip {
    padding: 7px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
    transition: all .2s;
    font-family: 'DM Sans', sans-serif;
    user-select: none;
  }

  .chip:hover, .chip.selected {
    background: rgba(79,142,255,.18);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ── Typing indicator ── */
  .typing {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 14px 18px;
  }
  .typing span {
    width: 7px; height: 7px;
    background: var(--muted);
    border-radius: 50%;
    animation: bounce .9s infinite ease-in-out;
  }
  .typing span:nth-child(2) { animation-delay: .15s; }
  .typing span:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce {
    0%,80%,100% { transform: scale(0.7); opacity:.5; }
    40% { transform: scale(1); opacity:1; }
  }

  /* ── Input area ── */
  .input-area {
    width: 100%;
    max-width: 760px;
    padding: 0 24px 28px;
    position: sticky;
    bottom: 0;
    background: linear-gradient(to top, var(--bg) 80%, transparent);
  }

  .input-box {
    display: flex;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px 10px 10px 18px;
    align-items: center;
    transition: border-color .2s;
  }
  .input-box:focus-within { border-color: var(--accent); }

  #userInput {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    resize: none;
    max-height: 120px;
    line-height: 1.5;
  }
  #userInput::placeholder { color: var(--muted); }

  .btn-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all .2s;
    flex-shrink: 0;
    font-size: 18px;
  }

  #sendBtn {
    background: var(--accent);
    color: #fff;
  }
  #sendBtn:hover { background: #3a7aec; }
  #sendBtn:disabled { background: var(--border); cursor: not-allowed; }

  #voiceBtn {
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
  }
  #voiceBtn:hover { color: var(--text); }
  #voiceBtn.listening {
    background: rgba(248,113,113,.15);
    border-color: var(--red);
    color: var(--red);
    animation: pulse 1.2s infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(248,113,113,.4); }
    50% { box-shadow: 0 0 0 6px rgba(248,113,113,0); }
  }

  .voice-hint {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin-top: 8px;
  }

  /* ── Review modal ── */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.75);
    backdrop-filter: blur(6px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s;
  }
  .overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    width: 100%;
    max-width: 680px;
    max-height: 85vh;
    overflow-y: auto;
    padding: 32px;
    transform: translateY(20px);
    transition: transform .3s;
  }
  .overlay.open .modal { transform: translateY(0); }

  .modal h2 {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    margin-bottom: 6px;
  }
  .modal .sub {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 24px;
  }

  .qa-item {
    padding: 16px;
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 12px;
  }
  .qa-q {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: .6px;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 6px;
  }
  .qa-a {
    font-size: 15px;
    line-height: 1.6;
    color: var(--text);
  }
  .qa-a.empty { color: var(--muted); font-style: italic; }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 24px;
    flex-wrap: wrap;
  }

  .btn {
    padding: 12px 22px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    transition: all .2s;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
    flex: 1;
  }
  .btn-primary:hover { background: #3a7aec; }
  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

  .btn-success {
    background: var(--green);
    color: #0a0a0f;
    font-weight: 600;
    flex: 1;
  }

  /* email field in modal */
  .email-field {
    display: flex;
    gap: 8px;
    align-items: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 14px;
    margin-top: 14px;
  }
  .email-field label { font-size: 13px; color: var(--muted); white-space: nowrap; }
  .email-field input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
  }

  /* success screen */
  .success-msg {
    text-align: center;
    padding: 40px 20px;
  }
  .success-icon { font-size: 52px; margin-bottom: 16px; }
  .success-msg h3 {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    margin-bottom: 8px;
  }
  .success-msg p { color: var(--muted); font-size: 15px; line-height: 1.6; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">GMN<span>.</span>agente</div>
  <div class="badge">Google Meu Negócio</div>
</header>

<div class="progress-wrap">
  <div class="progress-label">
    <span id="progressLabel">Iniciando...</span>
    <span id="progressPct">0%</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
</div>

<div class="chat-wrap">
  <div id="chatBox"></div>
</div>

<div class="input-area">
  <div class="input-box">
    <textarea id="userInput" rows="1" placeholder="Digite sua resposta..." disabled></textarea>
    <button class="btn-icon" id="voiceBtn" title="Falar">🎤</button>
    <button class="btn-icon" id="sendBtn" disabled>➤</button>
  </div>
  <div class="voice-hint" id="voiceHint">Pressione 🎤 para responder por voz</div>
</div>

<!-- Review Modal -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <h2>📋 Revisão das Informações</h2>
    <p class="sub">Confira tudo abaixo. Se estiver correto, envie para o consultor.</p>
    <div id="qaList"></div>
    <div class="email-field">
      <label>📧 E-mail do consultor:</label>
      <input type="email" id="consultorEmail" placeholder="consultor@email.com" value="">
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">✏️ Corrigir</button>
      <button class="btn btn-success" onclick="sendEmail()">✅ Aprovar e Enviar</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
// CONFIGURAÇÃO
// ═══════════════════════════════════════════════════
const GEMINI_API_KEY = "AIzaSyAYKrASX8vaUn6Ag03lJxe3Ygq-sSrtE5w";
const GEMINI_API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`;
const CONSULTANT_EMAIL_DEFAULT = ""; // preencha com seu e-mail

// ═══════════════════════════════════════════════════
// ESTADO
// ═══════════════════════════════════════════════════
let conversationHistory = [];
let answers = {};
let currentStep = 0;
let isWaiting = false;
let recognition = null;
let isListening = false;

const TOTAL_QUESTIONS = 28; // aprox.

// ═══════════════════════════════════════════════════
// ROTEIRO DE PERGUNTAS (com contexto para o AI)
// ═══════════════════════════════════════════════════
const SYSTEM_PROMPT = `Você é um assistente simpático e profissional chamado "Bê" que ajuda donos de pequenos negócios a preencher o cadastro do Google Meu Negócio.

Seu trabalho é fazer perguntas de forma CONVERSACIONAL — uma de cada vez — e registrar as respostas. Nunca faça mais de uma pergunta por mensagem.

Quando o usuário não souber responder, ajude com exemplos práticos e sugestões simples. Nunca deixe ele sem saída.

Siga esta SEQUÊNCIA DE TÓPICOS na ordem:
1. Nome da empresa
2. Segmento/tipo de negócio
3. Cidade e estado
4. Endereço completo
5. Telefone(s) de contato
6. E-mail da empresa
7. Site (se tiver)
8. Instagram e/ou Facebook (se tiver)
9. Data de abertura do negócio (mês e ano pelo menos)
10. Horários de atendimento (dias e horários)
11. Funcionamento em feriados
12. Área de cobertura / bairros atendidos
13. Produtos e/ou serviços oferecidos (peça detalhes)
14. Formas de pagamento aceitas
15. Tem estacionamento? (qual tipo)
16. Wi-fi disponível para clientes?
17. Acessibilidade (rampa, banheiro adaptado, etc.)
18. Local apropriado para crianças?
19. Banheiro disponível para clientes?
20. A empresa realiza agendamento ou atende sem marcar?
21. Horários especiais de serviço (entrega, retirada, drive-thru, etc.)
22. Bebidas são servidas no local?
23. Informações adicionais que o dono queira acrescentar

Para cada resposta, confirme brevemente o que entendeu e passe para o próximo tópico.

Quando TODOS os tópicos forem cobertos, diga: "COLETA_COMPLETA" seguido de um JSON com as respostas assim:
COLETA_COMPLETA
{"nome_empresa":"...","segmento":"...","cidade_estado":"...","endereco":"...","telefone":"...","email":"...","site":"...","redes_sociais":"...","data_abertura":"...","horario_atendimento":"...","feriados":"...","area_cobertura":"...","produtos_servicos":"...","formas_pagamento":"...","estacionamento":"...","wifi":"...","acessibilidade":"...","criancas":"...","banheiro":"...","agendamento":"...","horarios_especiais":"...","bebidas":"...","info_adicionais":"..."}

Seja amigável, use emojis com moderação, fale em português do Brasil. Nunca liste todas as perguntas de uma vez.`;

// ═══════════════════════════════════════════════════
// DOM helpers
// ═══════════════════════════════════════════════════
const chatBox = document.getElementById('chatBox');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const voiceBtn = document.getElementById('voiceBtn');
const progressFill = document.getElementById('progressFill');
const progressLabel = document.getElementById('progressLabel');
const progressPct = document.getElementById('progressPct');

function scrollBottom() {
  setTimeout(() => chatBox.scrollIntoView({ behavior: 'smooth', block: 'end' }), 100);
}

function appendMessage(role, text, tips = null, chips = null) {
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = `avatar ${role}`;
  avatar.textContent = role === 'bot' ? '🤖' : '👤';

  const bubble = document.createElement('div');
  bubble.className = `bubble ${role}`;
  bubble.innerHTML = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');

  if (tips) {
    const tipEl = document.createElement('div');
    tipEl.className = 'tip';
    tipEl.innerHTML = '💡 ' + tips;
    bubble.appendChild(tipEl);
  }

  if (chips && chips.length > 0) {
    const chipsWrap = document.createElement('div');
    chipsWrap.className = 'chips';
    chips.forEach(label => {
      const chip = document.createElement('button');
      chip.className = 'chip';
      chip.textContent = label;
      chip.onclick = () => {
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
        chip.classList.add('selected');
        userInput.value = label;
        handleSend();
      };
      chipsWrap.appendChild(chip);
    });
    bubble.appendChild(chipsWrap);
  }

  wrap.appendChild(avatar);
  wrap.appendChild(bubble);
  chatBox.appendChild(wrap);
  scrollBottom();
}

function showTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'msg bot';
  wrap.id = 'typingIndicator';
  const avatar = document.createElement('div');
  avatar.className = 'avatar bot';
  avatar.textContent = '🤖';
  const bubble = document.createElement('div');
  bubble.className = 'bubble bot typing';
  bubble.innerHTML = '<span></span><span></span><span></span>';
  wrap.appendChild(avatar);
  wrap.appendChild(bubble);
  chatBox.appendChild(wrap);
  scrollBottom();
}

function removeTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function setProgress(pct, label) {
  progressFill.style.width = Math.min(pct, 100) + '%';
  progressLabel.textContent = label;
  progressPct.textContent = Math.round(pct) + '%';
}

// ═══════════════════════════════════════════════════
// API call
// ═══════════════════════════════════════════════════
async function callGemini(userMsg) {
  // Gemini data structure uses 'user' e 'model' (não assistant) e array elements
  conversationHistory.push({ role: 'user', parts: [{ text: userMsg }] });

  showTyping();
  isWaiting = true;
  sendBtn.disabled = true;
  userInput.disabled = true;

  try {
    const payload = {
      systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] },
      contents: conversationHistory,
      generationConfig: {
        temperature: 0.7,
        maxOutputTokens: 1000
      }
    };

    const res = await fetch(GEMINI_API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(payload)
    });

    if (!res.ok) {
      throw new Error(`API Error: ${res.status}`);
    }

    const data = await res.json();
    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || 'Não consegui processar. Pode repetir?';

    conversationHistory.push({ role: 'model', parts: [{ text: reply }] });
    removeTyping();

    // Check if collection is complete
    if (reply.includes('COLETA_COMPLETA')) {
      try {
        const jsonMatch = reply.match(/\{[\s\S]+\}/);
        if (jsonMatch) {
          answers = JSON.parse(jsonMatch[0]);
        }
      } catch(e) { console.error('JSON parse err', e); }

      const cleanReply = reply.replace(/COLETA_COMPLETA[\s\S]*/, '').trim() ||
        '✅ Perfeito! Coletei todas as informações. Vou mostrar um resumo para você revisar antes de enviar ao consultor.';

      appendMessage('bot', cleanReply);
      speakText(cleanReply);
      setProgress(100, 'Concluído!');

      setTimeout(() => openModal(), 1500);
      return;
    }

    // Estimate progress
    currentStep = Math.min(currentStep + 1, TOTAL_QUESTIONS - 1);
    const pct = (currentStep / TOTAL_QUESTIONS) * 95;
    const topics = ['Identificação','Contato','Localização','Serviços','Comodidades','Pagamentos','Finalizando...'];
    const topicIdx = Math.floor(pct / 100 * topics.length);
    setProgress(pct, topics[Math.min(topicIdx, topics.length - 1)]);

    // Display reply
    appendMessage('bot', reply);
    speakText(reply);

  } catch(err) {
    removeTyping();
    appendMessage('bot', '⚠️ Erro de conexão com a IA. Verifique sua conexão.');
    console.error(err);
  }

  isWaiting = false;
  sendBtn.disabled = false;
  userInput.disabled = false;
  userInput.focus();
}

// ═══════════════════════════════════════════════════
// Send handler
// ═══════════════════════════════════════════════════
function handleSend() {
  const text = userInput.value.trim();
  if (!text || isWaiting) return;
  appendMessage('user', text);
  userInput.value = '';
  userInput.style.height = 'auto';
  callGemini(text);
}

sendBtn.addEventListener('click', handleSend);
userInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
});
userInput.addEventListener('input', () => {
  userInput.style.height = 'auto';
  userInput.style.height = userInput.scrollHeight + 'px';
});

// ═══════════════════════════════════════════════════
// Voice Recognition
// ═══════════════════════════════════════════════════
function setupVoice() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    voiceBtn.style.display = 'none';
    document.getElementById('voiceHint').textContent = 'Voz não disponível neste navegador';
    return;
  }

  recognition = new SpeechRecognition();
  recognition.lang = 'pt-BR';
  recognition.continuous = false;
  recognition.interimResults = true;

  recognition.onstart = () => {
    isListening = true;
    voiceBtn.classList.add('listening');
    voiceBtn.textContent = '🛑';
    document.getElementById('voiceHint').textContent = 'Ouvindo... clique para parar';
  };

  recognition.onresult = (e) => {
    const transcript = Array.from(e.results).map(r => r[0].transcript).join('');
    userInput.value = transcript;
  };

  recognition.onend = () => {
    isListening = false;
    voiceBtn.classList.remove('listening');
    voiceBtn.textContent = '🎤';
    document.getElementById('voiceHint').textContent = 'Pressione 🎤 para responder por voz';
    if (userInput.value.trim()) handleSend();
  };

  recognition.onerror = () => {
    isListening = false;
    voiceBtn.classList.remove('listening');
    voiceBtn.textContent = '🎤';
  };
}

voiceBtn.addEventListener('click', () => {
  if (!recognition) return;
  if (isListening) { recognition.stop(); return; }
  recognition.start();
});

// ═══════════════════════════════════════════════════
// Text-to-Speech (TTS) for bot messages
// ═══════════════════════════════════════════════════
let ttsEnabled = true; // Auto-ativado para proporcionar experiência humanizada

let availableVoices = [];
function loadVoices() {
  availableVoices = window.speechSynthesis.getVoices();
}
if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = loadVoices;
}

function speakText(text) {
  if (!ttsEnabled || !window.speechSynthesis) return;
  
  // Limpar formatação markdown e trechos limitados
  const clean = text.replace(/[*_~`#]/g, '').replace(/<[^>]*>?/gm, '').substring(0, 500);
  const utterance = new SpeechSynthesisUtterance(clean);
  utterance.lang = 'pt-BR';
  utterance.rate = 1.05; // Mais dinâmico
  utterance.pitch = 1.0;

  if (availableVoices.length === 0) {
    availableVoices = window.speechSynthesis.getVoices();
  }

  // Tentar achar voz mais "premium/humanizada" nativa em PT
  const ptVoices = availableVoices.filter(v => v.lang.startsWith('pt'));
  let bestVoice = ptVoices.find(v => v.name.toLowerCase().includes('natural') || v.name.toLowerCase().includes('online'));
  if (!bestVoice) bestVoice = ptVoices.find(v => v.name.toLowerCase().includes('google'));
  if (!bestVoice && ptVoices.length > 0) bestVoice = ptVoices[0];

  if (bestVoice) {
    utterance.voice = bestVoice;
  }

  speechSynthesis.cancel();
  speechSynthesis.speak(utterance);
}

const FIELD_LABELS = {
  nome_empresa: 'Nome da Empresa',
  segmento: 'Segmento / Tipo de Negócio',
  cidade_estado: 'Cidade e Estado',
  endereco: 'Endereço Completo',
  telefone: 'Telefone(s)',
  email: 'E-mail da Empresa',
  site: 'Site',
  redes_sociais: 'Redes Sociais',
  data_abertura: 'Data de Abertura',
  horario_atendimento: 'Horários de Atendimento',
  feriados: 'Funcionamento em Feriados',
  area_cobertura: 'Área de Cobertura',
  produtos_servicos: 'Produtos e/ou Serviços',
  formas_pagamento: 'Formas de Pagamento',
  estacionamento: 'Estacionamento',
  wifi: 'Wi-Fi',
  acessibilidade: 'Acessibilidade',
  criancas: 'Adequado para Crianças',
  banheiro: 'Banheiro para Clientes',
  agendamento: 'Agendamento / Atendimento',
  horarios_especiais: 'Horários Especiais',
  bebidas: 'Bebidas no Local',
  info_adicionais: 'Informações Adicionais'
};

function openModal() {
  const qaList = document.getElementById('qaList');
  qaList.innerHTML = '';

  Object.entries(FIELD_LABELS).forEach(([key, label]) => {
    const val = answers[key] || '';
    const item = document.createElement('div');
    item.className = 'qa-item';
    item.innerHTML = `
      <div class="qa-q">${label}</div>
      <div class="qa-a ${val ? '' : 'empty'}">${val || 'Não informado'}</div>
    `;
    qaList.appendChild(item);
  });

  document.getElementById('consultorEmail').value = CONSULTANT_EMAIL_DEFAULT;
  document.getElementById('overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  appendMessage('bot', 'Tudo bem! Pode me dizer o que precisa corrigir ou adicionar. 😊');
  sendBtn.disabled = false;
  userInput.disabled = false;
  userInput.focus();
}

async function sendEmail() {
  const email = document.getElementById('consultorEmail').value.trim();
  if (!email) {
    alert('Por favor, informe o e-mail do consultor.');
    return;
  }

  // Build the report text
  let report = '📋 RELATÓRIO GMN – NOVO CLIENTE\n';
  report += '═'.repeat(40) + '\n\n';
  Object.entries(FIELD_LABELS).forEach(([key, label]) => {
    const val = answers[key] || 'Não informado';
    report += `▪ ${label}:\n${val}\n\n`;
  });
  report += '═'.repeat(40) + '\n';
  report += `Gerado em: ${new Date().toLocaleString('pt-BR')}`;

  // Use mailto as fallback (works without backend)
  const subject = encodeURIComponent(`[GMN] Novo Cliente – ${answers.nome_empresa || 'Cadastro'}`);
  const body = encodeURIComponent(report);
  const mailto = `mailto:${email}?subject=${subject}&body=${body}`;

  // Show success in modal
  const modal = document.getElementById('modal');
  modal.innerHTML = `
    <div class="success-msg">
      <div class="success-icon">🎉</div>
      <h3>Informações enviadas!</h3>
      <p>O relatório foi preparado e o seu cliente de e-mail será aberto automaticamente para enviar ao consultor.<br><br>
      <strong>${email}</strong></p>
      <div style="margin-top:24px;">
        <button class="btn btn-secondary" onclick="document.getElementById('overlay').classList.remove('open')">Fechar</button>
      </div>
    </div>
  `;

  // Open mailto
  setTimeout(() => { window.location.href = mailto; }, 500);
}
