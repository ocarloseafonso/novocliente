<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulário de Novo Cliente</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Playfair+Display:ital,wght@1,500;1,600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0107;
    --surface: rgba(20, 10, 15, 0.92); /* Quase sólido para excelente contraste */
    --surface2: rgba(255, 255, 255, 0.08); /* Brilho mais claro no vidro */
    --border: rgba(255, 255, 255, 0.15); /* Bordas mais visíveis */
    --accent: #d92070;
    --accent-glow: #ff4c99;
    --accent2: #a11f59;
    --green: #34d399;
    --red: #f87171;
    --text: #ffffff;      /* Branco puro para melhorar visibilidade */
    --muted: #c8b0bc;     /* Cinza rosado bem legível */
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #090306 radial-gradient(circle at top right, #380721 0%, transparent 50%), radial-gradient(circle at bottom left, #4a0d33 0%, transparent 50%);
    background-attachment: fixed;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }

  /* ── Container ── */
  .app-container {
    width: 100%;
    max-width: 820px;
    background: var(--surface);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 32px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 40px 80px rgba(0,0,0,0.6);
  }

  /* ── Header ── */
  header {
    width: 100%;
    padding: 30px 40px 15px;
    display: flex;
    align-items: center;
    gap: 24px;
    position: relative;
  }

  .logo-image {
    width: auto;
    max-width: 140px;
    height: auto;
    max-height: 45px;
    object-fit: contain;
  }

  .header-title {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    color: #f7e6c1; /* Soft gold from screenshot */
    font-style: italic;
    font-weight: 500;
    flex: 1;
  }

  /* ── TTS Toggle (Escondido visualmente mas mantendo funcionalidade) ── */
  .tts-toggle {
    display: none;
  }

  /* ── Progress ── */
  .progress-wrap {
    width: 100%;
    padding: 10px 40px 0;
  }
  .progress-label {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
  }
  .progress-bar {
    height: 2px;
    background: rgba(255,255,255,0.08);
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent-glow);
    border-radius: 4px;
    transition: width .6s cubic-bezier(.4,0,.2,1);
    width: 0%;
  }

  /* ── Chat container ── */
  .chat-wrap {
    width: 100%;
    padding: 24px 40px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  #chatBox {
    display: flex;
    flex-direction: column;
    gap: 20px;
    min-height: 250px;
  }

  /* ── Messages ── */
  .msg {
    display: flex;
    gap: 12px;
    align-items: flex-end;
    animation: fadeUp .3s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; }

  .avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .avatar.bot {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    box-shadow: 0 0 15px rgba(217, 32, 112, 0.4);
  }

  .avatar.user {
    background: var(--surface2);
    border: 1px solid var(--border);
    font-size: 14px;
    color: var(--accent-glow);
  }

  .bubble {
    max-width: 75%;
    padding: 16px 20px;
    line-height: 1.5;
    font-size: 15px;
  }

  .bubble.bot {
    background: rgba(30, 15, 22, 0.85); /* Fundo mais denso e legível */
    border: 1px solid rgba(255, 76, 153, 0.3); /* Borda viva */
    border-radius: 16px 16px 16px 4px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
  }

  .bubble.user {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    box-shadow: 0 4px 15px rgba(217, 32, 112, 0.3);
    color: #fff;
    border-radius: 16px 16px 4px 16px;
  }

  /* ── Typing indicator ── */
  .typing {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 14px 18px;
  }
  .typing span {
    width: 6px; height: 6px;
    background: var(--accent-glow);
    border-radius: 50%;
    animation: bounce .9s infinite ease-in-out;
  }
  .typing span:nth-child(2) { animation-delay: .15s; }
  .typing span:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce {
    0%,80%,100% { transform: scale(0.7); opacity:.5; }
    40% { transform: scale(1); opacity:1; }
  }

  /* ── Input area ── */
  .input-area {
    width: 100%;
    padding: 20px 40px 30px;
    display: flex;
    gap: 16px;
    align-items: center;
  }

  .voice-group {
    display: flex;
    align-items: center;
    cursor: pointer;
    gap: 12px;
    color: var(--text); /* Texto mais brilhante */
    transition: color .2s;
  }
  .voice-group:hover, .voice-group.listening { color: var(--accent-glow); }
  .voice-text { font-size: 14px; font-weight: 500; white-space: nowrap; }

  #voiceBtn {
    background: rgba(217, 32, 112, 0.2); /* Fundo rosado para destacar */
    border: 2px solid var(--accent-glow); /* Borda vibrante */
    border-radius: 50%;
    width: 48px; height: 48px;
    color: var(--accent-glow);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    cursor: pointer;
    transition: all .2s;
    box-shadow: 0 0 10px rgba(255, 76, 153, 0.2);
  }
  .voice-group:hover #voiceBtn {
    background: var(--accent-glow);
    color: #fff;
    box-shadow: 0 0 20px rgba(255, 76, 153, 0.5);
  }
  .voice-group.listening #voiceBtn {
    background: var(--accent-glow);
    color: #fff;
    border-color: var(--text);
    animation: pulse 1.2s infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(255, 76, 153,.3); }
    50% { box-shadow: 0 0 0 8px rgba(255, 76, 153, 0); }
  }

  .input-box {
    flex: 1;
    background: rgba(20, 10, 15, 0.8); /* Preenchimento um pouco mais escuro para ler o placeholder */
    border: 1px solid var(--border);
    border-radius: 30px;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    transition: border-color .2s;
    box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.5);
  }
  .input-box:focus-within { border-color: var(--accent-glow); }

  #userInput {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    resize: none;
    max-height: 100px;
    line-height: 1.4;
  }
  #userInput::placeholder { color: var(--border); }

  #sendBtn {
    background: linear-gradient(135deg, var(--accent), var(--accent-glow));
    border-radius: 50%;
    width: 44px; height: 44px;
    color: #fff;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all .2s;
    font-size: 16px;
    box-shadow: 0 4px 15px rgba(217, 32, 112, 0.4);
  }
  #sendBtn:hover { transform: scale(1.05); }
  #sendBtn:disabled { filter: grayscale(1); opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

  /* ── Review modal ── */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.8);
    backdrop-filter: blur(8px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s;
  }
  .overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    width: 100%;
    max-width: 680px;
    max-height: 85vh;
    overflow-y: auto;
    padding: 32px;
    transform: translateY(20px);
    transition: transform .3s;
  }
  .overlay.open .modal { transform: translateY(0); }

  .modal h2 { font-family: 'Syne', sans-serif; font-size: 22px; margin-bottom: 6px; }
  .modal .sub { color: var(--muted); font-size: 14px; margin-bottom: 24px; }

  .qa-item { padding: 16px; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 12px; }
  .qa-q { font-size: 12px; text-transform: uppercase; letter-spacing: .6px; color: var(--accent-glow); font-weight: 600; margin-bottom: 6px; }
  .qa-a { font-size: 15px; color: var(--text); }

  .btn { padding: 12px 22px; border-radius: 10px; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; transition: all .2s; }
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }
  .modal-actions { display: flex; gap: 10px; margin-top: 24px; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div class="app-container">
  <header>
    <img src="logo.png" alt="Logo da Empresa" class="logo-image">
    <div class="header-title">Formulário de Novo Cliente</div>
    <div class="tts-toggle active" id="ttsToggle" onclick="toggleTTS()">🔊 Voz</div>
  </header>

  <div class="progress-wrap">
    <div class="progress-label">
      <span id="progressLabel">Iniciando cadastro...</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>

  <div class="chat-wrap">
    <div id="chatBox"></div>
  </div>

  <div class="input-area">
    <div class="voice-group" id="voiceGroup" onclick="document.getElementById('voiceBtn').click()">
      <button id="voiceBtn" title="Falar">🎤</button>
      <span class="voice-text" id="voiceHint">Ativar o microfone</span>
    </div>
    
    <div class="input-box">
      <textarea id="userInput" rows="1" placeholder="Digite a sua resposta..."></textarea>
    </div>
    
    <button id="sendBtn">➤</button>
  </div>
</div>

<!-- Review Modal -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <h2>📋 Revisão das Informações</h2>
    <p class="sub">Confira tudo abaixo. Se estiver correto, envie para o consultor.</p>
    <div id="qaList"></div>
    <div class="email-field">
      <label>📧 E-mail do consultor:</label>
      <input type="email" id="consultorEmail" placeholder="consultor@email.com" value="">
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">✏️ Corrigir</button>
      <button class="btn btn-success" onclick="sendEmail()">✅ Aprovar e Enviar</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
// CONFIGURAÇÃO
// ═══════════════════════════════════════════════════
// URL do nosso backend seguro na Vercel (a chave fica lá, nunca aqui)
const OPENAI_API_URL = "/api/chat";
const OPENAI_TTS_URL = "/api/tts";
const OPENAI_MODEL = "gpt-4o-mini";

// URL do Apps Script (Banco de Dados Google Sheets)
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxTdBCSKXIioVzBnu0c7tlqChaCetvO7Yg_cssjiAuEzkv9LhcxNsD_EheW7px8pk98UQ/exec";

const CONSULTANT_EMAIL_DEFAULT = "";

// ═══════════════════════════════════════════════════
// ESTADO
// ═══════════════════════════════════════════════════
let conversationHistory = [];
let currentClient = null;       // { nome, codigo, status }
let clientFields = [];          // perguntas + respostas do cliente
let formQuestions = [];          // perguntas do formulário base
let currentQuestionIndex = 0;    // qual pergunta estamos
let isAuthenticated = false;
let isWaiting = false;
let recognition = null;
let isListening = false;
let ttsEnabled = true;
let currentAudio = null;

// ═══════════════════════════════════════════════════
// SYSTEM PROMPT (dinâmico)
// ═══════════════════════════════════════════════════
function buildSystemPrompt(clientData, questions, fieldsState) {
  const answeredStr = fieldsState
    .filter(f => f.answer)
    .map(f => `- ${f.question}: ${f.answer}`)
    .join('\n');

  const pendingStr = fieldsState
    .filter(f => !f.answer)
    .map(f => {
      let line = `ID: ${f.rowIndex} | Pergunta: ${f.question}`;
      if (f.observacao) line += ` | NOTA PARA A IA: ${f.observacao}`;
      return line;
    })
    .join('\n');

  return `Você é uma assistente virtual carismática, calorosa e super humana da C.E. Afonso Soluções Digitais. Você ajuda donos de pequenos negócios a preencher o cadastro do Google Meu Negócio.

REGRAS DE COMPORTAMENTO:
1. SEJA HUMANA: Use linguagem natural do cotidiano brasileiro. Expresse emoções genuínas ("Que ótimo!", "Perfeito!", "Ah, entendi!"). Evite palavras formais desnecessárias.
2. UMA PERGUNTA POR VEZ: Nunca faça mais de uma pergunta por mensagem. Escute antes de avançar.
3. SEJA BREVE: Respostas curtas e diretas. No máximo 2-3 frases antes de fazer a pergunta.
4. ACOLHA SEMPRE: Se a pessoa não souber algo, ajude com exemplos reais e diga que pode pular e voltar depois.
5. NOTAS PARA A IA: Quando uma pergunta tiver uma "NOTA PARA A IA", leia a orientação. Se for uma dica de como coletar o dado, incorpore na sua pergunta para ajudar o usuário. Se for uma regra, aplique-a na validação. NUNCA diga textualmente "Tenho uma nota aqui que diz", incorpore a inteligência na sua fala orgânica.
6. LGPD: Não revele informações de outros clientes. Apenas dados do cliente ${clientData.nome} (código ${clientData.codigo}).
7. RETORNO MUITO HUMANO: Quando o cliente informa que está voltando, fique feliz pelo retorno ("Que bom ter você de volta, fulano!"), faça um resumo super rápido e orgânico de 1-2 coisas que ele já preencheu, só para situá-lo, e puxe logo a próxima pergunta.

CLIENTE ATUAL:
- Nome: ${clientData.nome}
- Código: ${clientData.codigo}

${answeredStr ? `JÁ RESPONDIDAS (não pergunte sobre elas novamente):\n${answeredStr}\n` : ''}
${pendingStr ? `PERGUNTAS PENDENTES (faça na ordem, uma de cada vez):\n${pendingStr}\n` : ''}

SISTEMA DE SALVAMENTO:
Quando o cliente fornecer uma informação:

1. PRIMEIRO, avalie se a informação parece válida e coerente:
   - Nome/sobrenome: deve ter pelo menos 2 palavras
   - Telefone: deve ter formato de número de telefone
   - E-mail: deve conter @ e ponto
   - Cidade/Estado: deve ser um nome de cidade e estado brasileiro reconhecível
   - Se a resposta não faz sentido para a pergunta (ex: diz "não sei" como nome), sinalize.

2. SE A INFORMAÇÃO PARECER SUSPEITA OU INVÁLIDA, não salve ainda. Diga que achou estranha e pergunte:
   [CONFIRMAR|ID|resposta_suspeita]
   Formato da mensagem: "Hmm, isso parece um pouco diferente do que eu esperava para [campo]. Você disse '...'. Quer confirmar dessa forma mesmo ou prefere corrigir?"

3. SE A INFORMAÇÃO PARECER VÁLIDA, salve normalmente:
   [SALVAR|ID|resposta]

Exemplo prático:
- Pergunta "ID: 2 | Telefone", cliente disse "bom dia" → use [CONFIRMAR|2|bom dia]
- Pergunta "ID: 2 | Telefone", cliente disse "11 99999-0000" → use [SALVAR|2|11 99999-0000]

Quando TODAS as perguntas forem respondidas, diga "COLETA_COMPLETA" no final.`;
}

// ═══════════════════════════════════════════════════
// DOM helpers
// ═══════════════════════════════════════════════════
const chatBox = document.getElementById('chatBox');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const voiceBtn = document.getElementById('voiceBtn');
const progressFill = document.getElementById('progressFill');
const progressLabel = document.getElementById('progressLabel');
const progressPct = document.getElementById('progressPct');

function scrollBottom() {
  setTimeout(() => chatBox.scrollIntoView({ behavior: 'smooth', block: 'end' }), 100);
}

function appendMessage(role, text) {
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = `avatar ${role}`;
  avatar.textContent = role === 'bot' ? '🤖' : '👤';

  const bubble = document.createElement('div');
  bubble.className = `bubble ${role}`;
  // Clean [SALVAR|...|...] markers before showing
  const cleanText = text.replace(/\[SALVAR\|[^\]]*\]/g, '').trim();
  bubble.innerHTML = cleanText.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');

  wrap.appendChild(avatar);
  wrap.appendChild(bubble);
  chatBox.appendChild(wrap);
  scrollBottom();
}

function showTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'msg bot';
  wrap.id = 'typingIndicator';
  const avatar = document.createElement('div');
  avatar.className = 'avatar bot';
  avatar.textContent = '🤖';
  const bubble = document.createElement('div');
  bubble.className = 'bubble bot typing';
  bubble.innerHTML = '<span></span><span></span><span></span>';
  wrap.appendChild(avatar);
  wrap.appendChild(bubble);
  chatBox.appendChild(wrap);
  scrollBottom();
}

function removeTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function setProgress(pct, label) {
  progressFill.style.width = Math.min(pct, 100) + '%';
  progressLabel.textContent = label;
  progressPct.textContent = Math.round(pct) + '%';
}

// ═══════════════════════════════════════════════════
// APPS SCRIPT CALLS (usa GET para evitar CORS)
// ═══════════════════════════════════════════════════
async function callAppsScript(params) {
  try {
    const url = new URL(APPS_SCRIPT_URL);
    Object.entries(params).forEach(([k, v]) => url.searchParams.append(k, v));
    const res = await fetch(url.toString(), {
      method: 'GET',
      redirect: 'follow'
    });
    const text = await res.text();
    return JSON.parse(text);
  } catch (err) {
    console.error('Apps Script error:', err);
    return { error: err.toString() };
  }
}

// ═══════════════════════════════════════════════════
// FLUXO DE AUTENTICAÇÃO (Código de Acesso)
// ═══════════════════════════════════════════════════
async function handleCodeInput(code) {
  appendMessage('user', code);
  
  // Mensagem imediata enquanto consulta a planilha
  appendMessage('bot', 'Só um instante, estou verificando o seu código no sistema... 🔎');
  speakText('Só um instante, estou verificando o seu código no sistema.');
  
  showTyping();

  const result = await callAppsScript({ action: 'checkCode', codigo: code.trim() });
  removeTyping();

  if (result.error) {
    appendMessage('bot', '⚠️ Tive um problema ao acessar o banco de dados. Tente novamente em alguns segundos.');
    speakText('Tive um problema ao acessar o banco de dados. Tente novamente.');
    return;
  }

  if (!result.found) {
    appendMessage('bot', '❌ Código não encontrado. Verifique se digitou corretamente e tente novamente.');
    speakText('Código não encontrado. Verifique e tente novamente.');
    return;
  }

  currentClient = {
    nome: result.nome,
    codigo: result.codigo,
    status: result.status
  };

  isAuthenticated = true;
  userInput.placeholder = 'Digite sua resposta...';

  // Criar aba do cliente se necessário
  await callAppsScript({ action: 'createClientTab', codigo: currentClient.codigo });

  // Buscar dados do cliente (perguntas + respostas existentes)
  const clientData = await callAppsScript({ action: 'getClientData', codigo: currentClient.codigo });

  if (clientData.fields) {
    clientFields = clientData.fields;
  }

  // Calcular progresso
  const answered = clientFields.filter(f => f.answer).length;
  const total = clientFields.length;
  const pct = total > 0 ? (answered / total) * 100 : 0;

  if (pct >= 100) {
    setProgress(100, 'Cadastro completo!');
    appendMessage('bot', `Olá, ${currentClient.nome}! 🎉 Seu cadastro já está completo! Se precisar alterar alguma informação, é só me avisar.`);
    speakText(`Olá, ${currentClient.nome}! Seu cadastro já está completo! Se precisar alterar alguma informação, é só me avisar.`);
    return;
  }

  setProgress(pct, answered > 0 ? 'Continuando cadastro...' : 'Iniciando cadastro...');

  // Iniciar conversa com a IA
  const greeting = answered > 0
    ? `Meu código é ${currentClient.codigo}. Meu nome é ${currentClient.nome}. Eu já tinha começado o cadastro, tive que sair, e agora estou voltando. Comemore minha volta de forma calorosa, me lembre rapidamente onde paramos (citando brevemente o que já fizemos) e faça a próxima pergunta do cadastro.`
    : `Meu código é ${currentClient.codigo}. Meu nome é ${currentClient.nome}. Quero começar o cadastro do meu negócio no Google Meu Negócio. Me dê as boas vindas.`;

  await callOpenAI(greeting);
}

// ═══════════════════════════════════════════════════
// OPENAI API (gpt-4o-mini)
// ═══════════════════════════════════════════════════
async function callOpenAI(userMsg) {
  // Formato OpenAI: { role: 'user'|'assistant', content: '...' }
  conversationHistory.push({ role: 'user', content: userMsg });

  showTyping();
  isWaiting = true;
  sendBtn.disabled = true;
  userInput.disabled = true;

  try {
    const systemPrompt = buildSystemPrompt(currentClient, formQuestions, clientFields);

    const messages = [
      { role: 'system', content: systemPrompt },
      ...conversationHistory
    ];

    const res = await fetch(OPENAI_API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        model: OPENAI_MODEL,
        messages: messages,
        temperature: 0.85,
        max_tokens: 800
      })
    });

    if (!res.ok) {
      const errData = await res.json().catch(() => ({}));
      throw new Error(`API Error ${res.status}: ${JSON.stringify(errData)}`);
    }

    const data = await res.json();
    const reply = data.choices?.[0]?.message?.content || 'Desculpe, não entendi. Pode repetir?';

    conversationHistory.push({ role: 'assistant', content: reply });
    removeTyping();

    // Processar marcadores de salvamento e confirmação
    const confirmMatches = [...reply.matchAll(/\[CONFIRMAR\|([^|]+)\|([^\]]+)\]/g)];
    const saveMatches = [...reply.matchAll(/\[SALVAR\|([^|]+)\|([^\]]+)\]/g)];
    
    if (confirmMatches.length > 0) {
      // Modo de confirmação: aguardar usuário confirmar ou corrigir
      for (const match of confirmMatches) {
        await processPendingConfirmation(match[1].trim(), match[2].trim());
      }
    } else {
      for (const match of saveMatches) {
        await processSaveMarker(match[1].trim(), match[2].trim());
      }
    }

    // Verificar se a coleta está completa
    if (reply.includes('COLETA_COMPLETA')) {
      const cleanReply = reply.replace(/COLETA_COMPLETA/g, '').replace(/\[SALVAR\|[^\]]*\]/g, '').trim() ||
        '✅ Perfeito! Todas as informações foram coletadas. Vou abrir um resumo para revisão.';
      appendMessage('bot', cleanReply);
      speakText(cleanReply);
      setProgress(100, 'Concluído!');
      setTimeout(() => openModal(), 1500);
      return;
    }

    // Atualizar progresso
    const answered = clientFields.filter(f => f.answer).length;
    const total = clientFields.length;
    const pct = total > 0 ? (answered / total) * 95 : 0;
    const topics = ['Identificação','Contato','Localização','Serviços','Comodidades','Finalizando...'];
    const topicIdx = Math.floor(pct / 100 * topics.length);
    setProgress(pct, topics[Math.min(topicIdx, topics.length - 1)]);

    appendMessage('bot', reply);
    speakText(reply.replace(/\[SALVAR\|[^\]]*\]/g, '').trim());

  } catch (err) {
    removeTyping();
    appendMessage('bot', '⚠️ Erro na conexão com a IA. Verifique sua internet e tente novamente.');
    console.error(err);
  }

  isWaiting = false;
  sendBtn.disabled = false;
  userInput.disabled = false;
  userInput.focus();
}

// ═══════════════════════════════════════════════════
// SISTEMA DE CONFIRMAÇÃO (dados suspeitos)
// ═══════════════════════════════════════════════════
let pendingConfirmation = null; // { id, value }

async function processPendingConfirmation(idStr, answerText) {
  const targetId = parseInt(idStr, 10);
  if (isNaN(targetId)) return;
  const match = clientFields.find(f => f.rowIndex === targetId);
  if (match) {
    pendingConfirmation = { id: targetId, value: answerText, field: match };
  }
}

// ═══════════════════════════════════════════════════
// PROCESSAR MARCADORES [SALVAR]
// ═══════════════════════════════════════════════════
async function processSaveMarker(idStr, answerText) {
  const targetId = parseInt(idStr, 10);
  if (isNaN(targetId)) return;

  const match = clientFields.find(f => f.rowIndex === targetId);

  if (match) {
    match.answer = answerText;
    pendingConfirmation = null; // limpa qualquer confirmação pendente
    console.log(`💾 Salvando ID ${targetId} (${match.question}): ${answerText}`);
    
    // Feedback visual discreto de salvamento
    const statusEl = document.getElementById('progressLabel');
    const originalText = statusEl.textContent;
    statusEl.textContent = "☁️ Sincronizando...";
    
    // Salvar na planilha
    await callAppsScript({
      action: 'saveAnswer',
      codigo: currentClient.codigo,
      rowIndex: match.rowIndex,
      resposta: answerText
    });
    
    setTimeout(() => { statusEl.textContent = originalText; }, 1000);
  }
}

// ═══════════════════════════════════════════════════
// Send handler
// ═══════════════════════════════════════════════════
function handleSend() {
  const text = userInput.value.trim();
  if (!text || isWaiting) return;

  // ★ INTERROMPE a voz da assistente na hora que o usuário envia mensagem
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
  }

  userInput.value = '';
  userInput.style.height = 'auto';

  if (!isAuthenticated) {
    handleCodeInput(text);
  } else {
    appendMessage('user', text);
    // Se havia uma confirmação pendente, passa o contexto para a IA saber da resposta do usuário
    if (pendingConfirmation) {
      const ctx = `O usuário respondeu sobre a confirmação do campo "${pendingConfirmation.field.question}": "${text}"`;
      callOpenAI(ctx);
    } else {
      callOpenAI(text);
    }
  }
}

sendBtn.addEventListener('click', handleSend);
userInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
});
userInput.addEventListener('input', () => {
  userInput.style.height = 'auto';
  userInput.style.height = userInput.scrollHeight + 'px';
});

// ═══════════════════════════════════════════════════
// Voice Recognition
// ═══════════════════════════════════════════════════
let shouldListen = false;

function setupVoice() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    document.getElementById('voiceGroup').style.display = 'none';
    return;
  }

  recognition = new SpeechRecognition();
  recognition.lang = 'pt-BR';
  recognition.continuous = true;
  recognition.interimResults = true;

  recognition.onstart = () => {
    isListening = true;
    document.getElementById('voiceGroup').classList.add('listening');
    voiceBtn.textContent = '🛑';
    document.getElementById('voiceHint').textContent = 'Ouvindo... clique para parar';
    userInput.placeholder = '🎙️ Fale agora...';
  };

  recognition.onresult = (e) => {
    let finalText = '';
    let interimText = '';
    for (let i = 0; i < e.results.length; i++) {
      const result = e.results[i];
      if (result.isFinal) {
        finalText += result[0].transcript;
      } else {
        interimText += result[0].transcript;
      }
    }
    userInput.value = finalText + interimText;
    userInput.style.height = 'auto';
    userInput.style.height = userInput.scrollHeight + 'px';
  };

  recognition.onend = () => {
    isListening = false;
    // Auto-restart se o usuário não clicou para parar
    if (shouldListen) {
      setTimeout(() => {
        try { recognition.start(); } catch(e) { /* ignora */ }
      }, 200);
      return;
    }
    document.getElementById('voiceGroup').classList.remove('listening');
    voiceBtn.textContent = '🎤';
    document.getElementById('voiceHint').textContent = 'Ativar o microfone';
    userInput.placeholder = 'Digite a sua resposta...';
  };

  recognition.onerror = (e) => {
    console.warn('Mic erro:', e.error);
    if (e.error === 'no-speech' || e.error === 'aborted') return;
    shouldListen = false;
    isListening = false;
    document.getElementById('voiceGroup').classList.remove('listening');
    voiceBtn.textContent = '🎤';
    document.getElementById('voiceHint').textContent = 'Ativar o microfone';
    userInput.placeholder = 'Digite a sua resposta...';
  };
}

voiceBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  if (!recognition) return;
  
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
  }
  if (shouldListen) {
    shouldListen = false;
    recognition.stop();
  } else {
    shouldListen = true;
    try { recognition.start(); } catch(err) { console.warn('Mic:', err); }
  }
});

// ═══════════════════════════════════════════════════
// Text-to-Speech (TTS) com Voz de Cinema (OpenAI)
// ═══════════════════════════════════════════════════
function toggleTTS() {
  ttsEnabled = !ttsEnabled;
  const el = document.getElementById('ttsToggle');
  if (ttsEnabled) {
    el.classList.add('active');
    el.innerHTML = '🔊 Voz';
  } else {
    el.classList.remove('active');
    el.innerHTML = '🔇 Mudo';
    if (currentAudio) {
      currentAudio.pause();
      currentAudio.currentTime = 0;
    }
  }
}

async function speakText(text, onEnd) {
  if (!ttsEnabled) { if (onEnd) onEnd(); return; }

  // Parar áudio atual se houver
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
  }

  // Limpar a formatação do markdown
  let clean = text.replace(/[*_~`#]/g, '').replace(/<[^>]*>?/gm, '');
  // Remover os comandos técnicos de salvamento
  clean = clean.replace(/\[SALVAR\|[^\]]*\]/g, '').replace(/\[CONFIRMAR\|[^\]]*\]/g, '');
  
  clean = clean.trim();
  if (!clean) { if (onEnd) onEnd(); return; }

  try {
    // Usar requisição GET direta no src do Audio aproveitando o Stream do navegador.
    // Isso tira os 1-2 segundos de delay do Fetch Blob (carregamento instantâneo).
    const qs = new URLSearchParams({ input: clean, voice: 'nova' }).toString();
    const url = `${OPENAI_TTS_URL}?${qs}`;
    
    currentAudio = new Audio(url);
    if (onEnd) {
      currentAudio.onended = () => { onEnd(); };
    }
    
    // Toca imediatamente
    currentAudio.play().catch(e => {
      console.warn('Playback impedido pelo navegador:', e);
      if (onEnd) onEnd();
    });

  } catch (err) {
    console.error('Erro ao gerar voz:', err);
    if (onEnd) onEnd();
  }
}

// ═══════════════════════════════════════════════════
// Modal (Review)
// ═══════════════════════════════════════════════════
function openModal() {
  const qaList = document.getElementById('qaList');
  qaList.innerHTML = '';

  clientFields.forEach(field => {
    const item = document.createElement('div');
    item.className = 'qa-item';
    item.innerHTML = `
      <div class="qa-q">${field.question}</div>
      <div class="qa-a ${field.answer ? '' : 'empty'}">${field.answer || 'Não informado'}</div>
    `;
    qaList.appendChild(item);
  });

  document.getElementById('consultorEmail').value = CONSULTANT_EMAIL_DEFAULT;
  document.getElementById('overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  appendMessage('bot', 'Tudo bem! Me diga o que precisa corrigir ou acrescentar. 😊');
  speakText('Tudo bem! Me diga o que precisa corrigir ou acrescentar.');
  sendBtn.disabled = false;
  userInput.disabled = false;
  userInput.focus();
}

async function sendEmail() {
  const email = document.getElementById('consultorEmail').value.trim();
  if (!email) { alert('Por favor, informe o e-mail do consultor.'); return; }

  let report = '📋 RELATÓRIO GMN – NOVO CLIENTE\n';
  report += `Cliente: ${currentClient.nome} | Código: ${currentClient.codigo}\n`;
  report += '═'.repeat(40) + '\n\n';
  clientFields.forEach(f => {
    report += `▪ ${f.question}:\n${f.answer || 'Não informado'}\n\n`;
  });
  report += '═'.repeat(40) + '\n';
  report += `Gerado em: ${new Date().toLocaleString('pt-BR')}`;

  const subject = encodeURIComponent(`[GMN] Novo Cliente – ${currentClient.nome}`);
  const body = encodeURIComponent(report);
  const mailto = `mailto:${email}?subject=${subject}&body=${body}`;

  const modal = document.getElementById('modal');
  modal.innerHTML = `
    <div class="success-msg">
      <div class="success-icon">🎉</div>
      <h3>Informações enviadas!</h3>
      <p>O relatório será aberto no seu cliente de e-mail.<br><br>
      <strong>${email}</strong></p>
      <div style="margin-top:24px;">
        <button class="btn btn-secondary" onclick="document.getElementById('overlay').classList.remove('open')">Fechar</button>
      </div>
    </div>
  `;

  setTimeout(() => { window.location.href = mailto; }, 500);
}

  setupVoice();

  // Mensagem inicial
  const greeting = 'Olá! Eu sou a assistente virtual da C.E. Afonso.\n\nSou responsável por realizar o seu cadastro aqui na empresa. 😊\n\nFique à vontade para digitar ou usar o microfone para falar comigo!\n\nPara começar, por favor me informe o seu **código de acesso**.';
  appendMessage('bot', greeting);

  speakText('Olá! Eu sou a assistente virtual da C.E. Afonso. Sou responsável por realizar o seu cadastro aqui na empresa. Fique à vontade para digitar ou usar o microfone para falar comigo. Para começar, por favor me informe o seu código de acesso.');

  userInput.focus();
}

init();
