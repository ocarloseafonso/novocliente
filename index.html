<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulário de Novo Cliente</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Playfair+Display:ital,wght@1,500;1,600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #090306;
    --surface: rgba(20, 10, 15, 0.5);
    --surface2: rgba(255, 255, 255, 0.05);
    --border: rgba(255, 255, 255, 0.06);
    --accent: #d92070;
    --accent-glow: #ff4c99;
    --accent2: #a11f59;
    --green: #34d399;
    --red: #f87171;
    --text: #f0e6ea;
    --muted: #a38c95;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #090306 radial-gradient(circle at top right, #380721 0%, transparent 50%), radial-gradient(circle at bottom left, #4a0d33 0%, transparent 50%);
    background-attachment: fixed;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }

  /* ── Container ── */
  .app-container {
    width: 100%;
    max-width: 820px;
    background: var(--surface);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 32px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 40px 80px rgba(0,0,0,0.6);
  }

  /* ── Header ── */
  header {
    width: 100%;
    padding: 30px 40px 15px;
    display: flex;
    align-items: center;
    gap: 24px;
    position: relative;
  }

  .logo-box {
    width: 80px;
    height: 60px;
    background: #9d295a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 1.5px;
  }

  .header-title {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    color: #f7e6c1; /* Soft gold from screenshot */
    font-style: italic;
    font-weight: 500;
    flex: 1;
  }

  /* ── TTS Toggle (Escondido visualmente mas mantendo funcionalidade) ── */
  .tts-toggle {
    display: none;
  }

  /* ── Progress ── */
  .progress-wrap {
    width: 100%;
    padding: 10px 40px 0;
  }
  .progress-label {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
  }
  .progress-bar {
    height: 2px;
    background: rgba(255,255,255,0.08);
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent-glow);
    border-radius: 4px;
    transition: width .6s cubic-bezier(.4,0,.2,1);
    width: 0%;
  }

  /* ── Chat container ── */
  .chat-wrap {
    width: 100%;
    padding: 24px 40px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  #chatBox {
    display: flex;
    flex-direction: column;
    gap: 20px;
    min-height: 250px;
  }

  /* ── Messages ── */
  .msg {
    display: flex;
    gap: 12px;
    align-items: flex-end;
    animation: fadeUp .3s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; }

  .avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .avatar.bot {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    box-shadow: 0 0 15px rgba(217, 32, 112, 0.4);
  }

  .avatar.user {
    background: var(--surface2);
    border: 1px solid var(--border);
    font-size: 14px;
    color: var(--accent-glow);
  }

  .bubble {
    max-width: 75%;
    padding: 16px 20px;
    line-height: 1.5;
    font-size: 15px;
  }

  .bubble.bot {
    background: rgba(10, 5, 8, 0.4);
    border: 1px solid rgba(217, 32, 112, 0.15);
    border-radius: 16px 16px 16px 4px;
  }

  .bubble.user {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    box-shadow: 0 4px 15px rgba(217, 32, 112, 0.3);
    color: #fff;
    border-radius: 16px 16px 4px 16px;
  }

  /* ── Typing indicator ── */
  .typing {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 14px 18px;
  }
  .typing span {
    width: 6px; height: 6px;
    background: var(--accent-glow);
    border-radius: 50%;
    animation: bounce .9s infinite ease-in-out;
  }
  .typing span:nth-child(2) { animation-delay: .15s; }
  .typing span:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce {
    0%,80%,100% { transform: scale(0.7); opacity:.5; }
    40% { transform: scale(1); opacity:1; }
  }

  /* ── Input area ── */
  .input-area {
    width: 100%;
    padding: 20px 40px 30px;
    display: flex;
    gap: 16px;
    align-items: center;
  }

  .voice-group {
    display: flex;
    align-items: center;
    cursor: pointer;
    gap: 10px;
    color: var(--muted);
    transition: color .2s;
  }
  .voice-group:hover, .voice-group.listening { color: var(--accent-glow); }
  .voice-text { font-size: 13px; white-space: nowrap; }

  #voiceBtn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 50%;
    width: 44px; height: 44px;
    color: inherit;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    cursor: pointer;
    transition: all .2s;
  }
  .voice-group.listening #voiceBtn {
    background: rgba(217, 32, 112, 0.15);
    border-color: var(--accent-glow);
    animation: pulse 1.2s infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(255, 76, 153,.3); }
    50% { box-shadow: 0 0 0 8px rgba(255, 76, 153, 0); }
  }

  .input-box {
    flex: 1;
    background: rgba(0, 0, 0, 0.2);
    border: 1px solid var(--border);
    border-radius: 30px;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    transition: border-color .2s;
  }
  .input-box:focus-within { border-color: var(--accent); }

  #userInput {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    resize: none;
    max-height: 100px;
    line-height: 1.4;
  }
  #userInput::placeholder { color: var(--border); }

  #sendBtn {
    background: linear-gradient(135deg, var(--accent), var(--accent-glow));
    border-radius: 50%;
    width: 44px; height: 44px;
    color: #fff;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all .2s;
    font-size: 16px;
    box-shadow: 0 4px 15px rgba(217, 32, 112, 0.4);
  }
  #sendBtn:hover { transform: scale(1.05); }
  #sendBtn:disabled { filter: grayscale(1); opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

  /* ── Review modal ── */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.8);
    backdrop-filter: blur(8px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s;
  }
  .overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    width: 100%;
    max-width: 680px;
    max-height: 85vh;
    overflow-y: auto;
    padding: 32px;
    transform: translateY(20px);
    transition: transform .3s;
  }
  .overlay.open .modal { transform: translateY(0); }

  .modal h2 { font-family: 'Syne', sans-serif; font-size: 22px; margin-bottom: 6px; }
  .modal .sub { color: var(--muted); font-size: 14px; margin-bottom: 24px; }

  .qa-item { padding: 16px; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 12px; }
  .qa-q { font-size: 12px; text-transform: uppercase; letter-spacing: .6px; color: var(--accent-glow); font-weight: 600; margin-bottom: 6px; }
  .qa-a { font-size: 15px; color: var(--text); }

  .btn { padding: 12px 22px; border-radius: 10px; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; transition: all .2s; }
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }
  .modal-actions { display: flex; gap: 10px; margin-top: 24px; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div class="app-container">
  <header>
    <div class="logo-box">LOGO</div>
    <div class="header-title">Formulário de Novo Cliente</div>
    <div class="tts-toggle active" id="ttsToggle" onclick="toggleTTS()">🔊 Voz</div>
  </header>

  <div class="progress-wrap">
    <div class="progress-label">
      <span id="progressLabel">Iniciando cadastro...</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>

  <div class="chat-wrap">
    <div id="chatBox"></div>
  </div>

  <div class="input-area">
    <div class="voice-group" id="voiceGroup" onclick="document.getElementById('voiceBtn').click()">
      <button id="voiceBtn" title="Falar">🎤</button>
      <span class="voice-text" id="voiceHint">Ativar o microfone</span>
    </div>
    
    <div class="input-box">
      <textarea id="userInput" rows="1" placeholder="Digite a sua resposta..."></textarea>
    </div>
    
    <button id="sendBtn">➤</button>
  </div>
</div>

<!-- Review Modal -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <h2>📋 Revisão das Informações</h2>
    <p class="sub">Confira tudo abaixo. Se estiver correto, envie para o consultor.</p>
    <div id="qaList"></div>
    <div class="email-field">
      <label>📧 E-mail do consultor:</label>
      <input type="email" id="consultorEmail" placeholder="consultor@email.com" value="">
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">✏️ Corrigir</button>
      <button class="btn btn-success" onclick="sendEmail()">✅ Aprovar e Enviar</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
// CONFIGURAÇÃO
// ═══════════════════════════════════════════════════
// URL do nosso backend seguro na Vercel (a chave fica lá, nunca aqui)
const OPENAI_API_URL = "/api/chat";
const OPENAI_MODEL = "gpt-4o-mini";

// URL do Apps Script (Banco de Dados Google Sheets)
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxTdBCSKXIioVzBnu0c7tlqChaCetvO7Yg_cssjiAuEzkv9LhcxNsD_EheW7px8pk98UQ/exec";

const CONSULTANT_EMAIL_DEFAULT = "";

// ═══════════════════════════════════════════════════
// ESTADO
// ═══════════════════════════════════════════════════
let conversationHistory = [];
let currentClient = null;       // { nome, codigo, status }
let clientFields = [];          // perguntas + respostas do cliente
let formQuestions = [];          // perguntas do formulário base
let currentQuestionIndex = 0;    // qual pergunta estamos
let isAuthenticated = false;
let isWaiting = false;
let recognition = null;
let isListening = false;
let ttsEnabled = true;

// ═══════════════════════════════════════════════════
// SYSTEM PROMPT (dinâmico)
// ═══════════════════════════════════════════════════
function buildSystemPrompt(clientData, questions, fieldsState) {
  const answeredStr = fieldsState
    .filter(f => f.answer)
    .map(f => `- ${f.question}: ${f.answer}`)
    .join('\n');

  const pendingStr = fieldsState
    .filter(f => !f.answer)
    .map(f => `ID: ${f.rowIndex} | Pergunta: ${f.question}`)
    .join('\n');

  return `Você é "Bê", um assistente simpático e extremamente humano que ajuda donos de pequenos negócios a preencher o cadastro do Google Meu Negócio.

REGRAS ESSENCIAIS:
1. Fale de forma NATURAL e CONVERSACIONAL — como uma pessoa de verdade, nunca um robô. Use expressões coloquiais, reaja genuinamente às respostas.
2. NUNCA faça mais de UMA pergunta por mensagem. Converse uma de cada vez.
3. Quando o cliente não souber, ajude com exemplos práticos. Não o pressione.
4. NUNCA revele informações de OUTROS clientes. Você só tem acesso ao cadastro pertencente ao código ${clientData.codigo} (${clientData.nome}).
5. De acordo com a LGPD, não forneça informações de terceiros e não compartilhe dados que não pertencem ao cadastro ativo.
6. Seja breve nas respostas para poupar dados de voz — fale o necessário sem enrolar.

CLIENTE ATUAL:
- Nome: ${clientData.nome}
- Código: ${clientData.codigo}

${answeredStr ? `JÁ RESPONDIDAS (não pergunte novamente):\n${answeredStr}\n` : ''}
${pendingStr ? `PERGUNTAS PENDENTES (faça na ordem, uma de cada vez):\n${pendingStr}\n` : ''}

Para cada resposta que o cliente der, confirme brevemente (1 frase) e passe para a próxima pergunta pendente.

IMPORTANTE - SALVAMENTO DE DADOS:
Para cada informação nova que o cliente fornecer, você DEVE obrigatoriamente incluir no final da sua mensagem o marcador técnico com o ID da pergunta:
[SALVAR|ID|resposta]
Exemplo: Se a pergunta era "ID: 2 | Nome da empresa" e o cliente disse "Bar do Zé", você escreve sua resposta simpática e termina com:
[SALVAR|2|Bar do Zé]

Quando TODAS as perguntas forem respondidas, diga "COLETA_COMPLETA" no final da sua mensagem.`;
}

// ═══════════════════════════════════════════════════
// DOM helpers
// ═══════════════════════════════════════════════════
const chatBox = document.getElementById('chatBox');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const voiceBtn = document.getElementById('voiceBtn');
const progressFill = document.getElementById('progressFill');
const progressLabel = document.getElementById('progressLabel');
const progressPct = document.getElementById('progressPct');

function scrollBottom() {
  setTimeout(() => chatBox.scrollIntoView({ behavior: 'smooth', block: 'end' }), 100);
}

function appendMessage(role, text) {
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = `avatar ${role}`;
  avatar.textContent = role === 'bot' ? '🤖' : '👤';

  const bubble = document.createElement('div');
  bubble.className = `bubble ${role}`;
  // Clean [SALVAR|...|...] markers before showing
  const cleanText = text.replace(/\[SALVAR\|[^\]]*\]/g, '').trim();
  bubble.innerHTML = cleanText.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');

  wrap.appendChild(avatar);
  wrap.appendChild(bubble);
  chatBox.appendChild(wrap);
  scrollBottom();
}

function showTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'msg bot';
  wrap.id = 'typingIndicator';
  const avatar = document.createElement('div');
  avatar.className = 'avatar bot';
  avatar.textContent = '🤖';
  const bubble = document.createElement('div');
  bubble.className = 'bubble bot typing';
  bubble.innerHTML = '<span></span><span></span><span></span>';
  wrap.appendChild(avatar);
  wrap.appendChild(bubble);
  chatBox.appendChild(wrap);
  scrollBottom();
}

function removeTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function setProgress(pct, label) {
  progressFill.style.width = Math.min(pct, 100) + '%';
  progressLabel.textContent = label;
  progressPct.textContent = Math.round(pct) + '%';
}

// ═══════════════════════════════════════════════════
// APPS SCRIPT CALLS (usa GET para evitar CORS)
// ═══════════════════════════════════════════════════
async function callAppsScript(params) {
  try {
    const url = new URL(APPS_SCRIPT_URL);
    Object.entries(params).forEach(([k, v]) => url.searchParams.append(k, v));
    const res = await fetch(url.toString(), {
      method: 'GET',
      redirect: 'follow'
    });
    const text = await res.text();
    return JSON.parse(text);
  } catch (err) {
    console.error('Apps Script error:', err);
    return { error: err.toString() };
  }
}

// ═══════════════════════════════════════════════════
// FLUXO DE AUTENTICAÇÃO (Código de Acesso)
// ═══════════════════════════════════════════════════
async function handleCodeInput(code) {
  appendMessage('user', code);
  showTyping();

  const result = await callAppsScript({ action: 'checkCode', codigo: code.trim() });
  removeTyping();

  if (result.error) {
    appendMessage('bot', '⚠️ Tive um problema ao acessar o banco de dados. Tente novamente em alguns segundos.');
    speakText('Tive um problema ao acessar o banco de dados. Tente novamente.');
    return;
  }

  if (!result.found) {
    appendMessage('bot', '❌ Código não encontrado. Verifique se digitou corretamente e tente novamente.');
    speakText('Código não encontrado. Verifique e tente novamente.');
    return;
  }

  currentClient = {
    nome: result.nome,
    codigo: result.codigo,
    status: result.status
  };

  isAuthenticated = true;
  userInput.placeholder = 'Digite sua resposta...';

  // Criar aba do cliente se necessário
  await callAppsScript({ action: 'createClientTab', codigo: currentClient.codigo });

  // Buscar dados do cliente (perguntas + respostas existentes)
  const clientData = await callAppsScript({ action: 'getClientData', codigo: currentClient.codigo });

  if (clientData.fields) {
    clientFields = clientData.fields;
  }

  // Calcular progresso
  const answered = clientFields.filter(f => f.answer).length;
  const total = clientFields.length;
  const pct = total > 0 ? (answered / total) * 100 : 0;

  if (pct >= 100) {
    setProgress(100, 'Cadastro completo!');
    appendMessage('bot', `Olá, ${currentClient.nome}! 🎉 Seu cadastro já está completo! Se precisar alterar alguma informação, é só me avisar.`);
    speakText(`Olá, ${currentClient.nome}! Seu cadastro já está completo! Se precisar alterar alguma informação, é só me avisar.`);
    return;
  }

  setProgress(pct, answered > 0 ? 'Continuando cadastro...' : 'Iniciando cadastro...');

  // Iniciar conversa com a IA
  const greeting = answered > 0
    ? `Meu código é ${currentClient.codigo}. Meu nome é ${currentClient.nome}. Já respondi algumas perguntas antes. Podemos continuar de onde paramos?`
    : `Meu código é ${currentClient.codigo}. Meu nome é ${currentClient.nome}. Quero começar o cadastro do meu negócio no Google Meu Negócio.`;

  await callOpenAI(greeting);
}

// ═══════════════════════════════════════════════════
// OPENAI API (gpt-4o-mini)
// ═══════════════════════════════════════════════════
async function callOpenAI(userMsg) {
  // Formato OpenAI: { role: 'user'|'assistant', content: '...' }
  conversationHistory.push({ role: 'user', content: userMsg });

  showTyping();
  isWaiting = true;
  sendBtn.disabled = true;
  userInput.disabled = true;

  try {
    const systemPrompt = buildSystemPrompt(currentClient, formQuestions, clientFields);

    const messages = [
      { role: 'system', content: systemPrompt },
      ...conversationHistory
    ];

    const res = await fetch(OPENAI_API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        model: OPENAI_MODEL,
        messages: messages,
        temperature: 0.85,
        max_tokens: 800
      })
    });

    if (!res.ok) {
      const errData = await res.json().catch(() => ({}));
      throw new Error(`API Error ${res.status}: ${JSON.stringify(errData)}`);
    }

    const data = await res.json();
    const reply = data.choices?.[0]?.message?.content || 'Desculpe, não entendi. Pode repetir?';

    conversationHistory.push({ role: 'assistant', content: reply });
    removeTyping();

    // Processar marcadores de salvamento [SALVAR|pergunta|resposta]
    const saveMatches = reply.matchAll(/\[SALVAR\|([^|]+)\|([^\]]+)\]/g);
    for (const match of saveMatches) {
      await processSaveMarker(match[1].trim(), match[2].trim());
    }

    // Verificar se a coleta está completa
    if (reply.includes('COLETA_COMPLETA')) {
      const cleanReply = reply.replace(/COLETA_COMPLETA/g, '').replace(/\[SALVAR\|[^\]]*\]/g, '').trim() ||
        '✅ Perfeito! Todas as informações foram coletadas. Vou abrir um resumo para revisão.';
      appendMessage('bot', cleanReply);
      speakText(cleanReply);
      setProgress(100, 'Concluído!');
      setTimeout(() => openModal(), 1500);
      return;
    }

    // Atualizar progresso
    const answered = clientFields.filter(f => f.answer).length;
    const total = clientFields.length;
    const pct = total > 0 ? (answered / total) * 95 : 0;
    const topics = ['Identificação','Contato','Localização','Serviços','Comodidades','Finalizando...'];
    const topicIdx = Math.floor(pct / 100 * topics.length);
    setProgress(pct, topics[Math.min(topicIdx, topics.length - 1)]);

    appendMessage('bot', reply);
    speakText(reply.replace(/\[SALVAR\|[^\]]*\]/g, '').trim());

  } catch (err) {
    removeTyping();
    appendMessage('bot', '⚠️ Erro na conexão com a IA. Verifique sua internet e tente novamente.');
    console.error(err);
  }

  isWaiting = false;
  sendBtn.disabled = false;
  userInput.disabled = false;
  userInput.focus();
}

// ═══════════════════════════════════════════════════
// PROCESSAR MARCADORES [SALVAR]
// ═══════════════════════════════════════════════════
async function processSaveMarker(idStr, answerText) {
  const targetId = parseInt(idStr, 10);
  if (isNaN(targetId)) return;

  const match = clientFields.find(f => f.rowIndex === targetId);

  if (match) {
    match.answer = answerText;
    console.log(`💾 Salvando ID ${targetId} (${match.question}): ${answerText}`);
    
    // Feedback visual discreto de salvamento
    const statusEl = document.getElementById('progressLabel');
    const originalText = statusEl.textContent;
    statusEl.textContent = "☁️ Sincronizando...";
    
    // Salvar na planilha
    await callAppsScript({
      action: 'saveAnswer',
      codigo: currentClient.codigo,
      rowIndex: match.rowIndex,
      resposta: answerText
    });
    
    setTimeout(() => { statusEl.textContent = originalText; }, 1000);
  }
}

// ═══════════════════════════════════════════════════
// Send handler
// ═══════════════════════════════════════════════════
function handleSend() {
  const text = userInput.value.trim();
  if (!text || isWaiting) return;

  userInput.value = '';
  userInput.style.height = 'auto';

  if (!isAuthenticated) {
    handleCodeInput(text);
  } else {
    appendMessage('user', text);
    callOpenAI(text);
  }
}

sendBtn.addEventListener('click', handleSend);
userInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
});
userInput.addEventListener('input', () => {
  userInput.style.height = 'auto';
  userInput.style.height = userInput.scrollHeight + 'px';
});

// ═══════════════════════════════════════════════════
// Voice Recognition
// ═══════════════════════════════════════════════════
function setupVoice() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    voiceBtn.style.display = 'none';
    document.getElementById('voiceHint').textContent = 'Voz não disponível neste navegador';
    return;
  }

  recognition = new SpeechRecognition();
  recognition.lang = 'pt-BR';
  recognition.continuous = false;
  recognition.interimResults = true;

  recognition.onstart = () => {
    isListening = true;
    voiceBtn.classList.add('listening');
    voiceBtn.textContent = '🛑';
    document.getElementById('voiceHint').textContent = 'Ouvindo... clique para parar';
  };

  recognition.onresult = (e) => {
    const transcript = Array.from(e.results).map(r => r[0].transcript).join('');
    userInput.value = transcript;
  };

  recognition.onend = () => {
    isListening = false;
    voiceBtn.classList.remove('listening');
    voiceBtn.textContent = '🎤';
    document.getElementById('voiceHint').textContent = 'Pressione 🎤 para responder por voz';
    if (userInput.value.trim()) handleSend();
  };

  recognition.onerror = () => {
    isListening = false;
    voiceBtn.classList.remove('listening');
    voiceBtn.textContent = '🎤';
  };
}

voiceBtn.addEventListener('click', () => {
  if (!recognition) return;
  // Parar TTS se estiver falando
  if (window.speechSynthesis) speechSynthesis.cancel();
  if (isListening) { recognition.stop(); return; }
  recognition.start();
});

// ═══════════════════════════════════════════════════
// Text-to-Speech (TTS) humanizado
// ═══════════════════════════════════════════════════
let availableVoices = [];
function loadVoices() {
  availableVoices = window.speechSynthesis.getVoices();
}
if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = loadVoices;
}

function toggleTTS() {
  ttsEnabled = !ttsEnabled;
  const el = document.getElementById('ttsToggle');
  if (ttsEnabled) {
    el.classList.add('active');
    el.innerHTML = '🔊 Voz';
  } else {
    el.classList.remove('active');
    el.innerHTML = '🔇 Mudo';
    if (window.speechSynthesis) speechSynthesis.cancel();
  }
}

function speakText(text) {
  if (!ttsEnabled || !window.speechSynthesis) return;

  // Limpar formatação
  const clean = text.replace(/[*_~`#]/g, '').replace(/<[^>]*>?/gm, '').replace(/\[SALVAR\|[^\]]*\]/g, '').substring(0, 500);
  const utterance = new SpeechSynthesisUtterance(clean);
  utterance.lang = 'pt-BR';
  utterance.rate = 1.05;
  utterance.pitch = 1.0;

  if (availableVoices.length === 0) {
    availableVoices = window.speechSynthesis.getVoices();
  }

  // Procurar melhor voz PT-BR
  const ptVoices = availableVoices.filter(v => v.lang.startsWith('pt'));
  let bestVoice = ptVoices.find(v => v.name.toLowerCase().includes('natural') || v.name.toLowerCase().includes('online'));
  if (!bestVoice) bestVoice = ptVoices.find(v => v.name.toLowerCase().includes('google'));
  if (!bestVoice && ptVoices.length > 0) bestVoice = ptVoices[0];

  if (bestVoice) utterance.voice = bestVoice;

  speechSynthesis.cancel();
  speechSynthesis.speak(utterance);
}

// ═══════════════════════════════════════════════════
// Modal (Review)
// ═══════════════════════════════════════════════════
function openModal() {
  const qaList = document.getElementById('qaList');
  qaList.innerHTML = '';

  clientFields.forEach(field => {
    const item = document.createElement('div');
    item.className = 'qa-item';
    item.innerHTML = `
      <div class="qa-q">${field.question}</div>
      <div class="qa-a ${field.answer ? '' : 'empty'}">${field.answer || 'Não informado'}</div>
    `;
    qaList.appendChild(item);
  });

  document.getElementById('consultorEmail').value = CONSULTANT_EMAIL_DEFAULT;
  document.getElementById('overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  appendMessage('bot', 'Tudo bem! Me diga o que precisa corrigir ou acrescentar. 😊');
  speakText('Tudo bem! Me diga o que precisa corrigir ou acrescentar.');
  sendBtn.disabled = false;
  userInput.disabled = false;
  userInput.focus();
}

async function sendEmail() {
  const email = document.getElementById('consultorEmail').value.trim();
  if (!email) { alert('Por favor, informe o e-mail do consultor.'); return; }

  let report = '📋 RELATÓRIO GMN – NOVO CLIENTE\n';
  report += `Cliente: ${currentClient.nome} | Código: ${currentClient.codigo}\n`;
  report += '═'.repeat(40) + '\n\n';
  clientFields.forEach(f => {
    report += `▪ ${f.question}:\n${f.answer || 'Não informado'}\n\n`;
  });
  report += '═'.repeat(40) + '\n';
  report += `Gerado em: ${new Date().toLocaleString('pt-BR')}`;

  const subject = encodeURIComponent(`[GMN] Novo Cliente – ${currentClient.nome}`);
  const body = encodeURIComponent(report);
  const mailto = `mailto:${email}?subject=${subject}&body=${body}`;

  const modal = document.getElementById('modal');
  modal.innerHTML = `
    <div class="success-msg">
      <div class="success-icon">🎉</div>
      <h3>Informações enviadas!</h3>
      <p>O relatório será aberto no seu cliente de e-mail.<br><br>
      <strong>${email}</strong></p>
      <div style="margin-top:24px;">
        <button class="btn btn-secondary" onclick="document.getElementById('overlay').classList.remove('open')">Fechar</button>
      </div>
    </div>
  `;

  setTimeout(() => { window.location.href = mailto; }, 500);
}

async function init() {
  setupVoice();
  if (window.speechSynthesis) loadVoices();
  setProgress(0, 'Aguardando código...');

  // Mensagem inicial (sem IA — é local)
  const greeting = 'Olá! 👋 Eu sou o **Bê**, seu assistente do Google Meu Negócio.\n\nPara começarmos, por favor, digite ou fale o seu **código de acesso**.\n\nEsse código foi fornecido pelo seu consultor. 🔐';
  appendMessage('bot', greeting);
  speakText('Olá! Eu sou o Bê, seu assistente do Google Meu Negócio. Para começarmos, por favor, digite ou fale o seu código de acesso.');

  userInput.focus();
}

init();
